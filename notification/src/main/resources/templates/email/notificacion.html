<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <title>Notificación SurtiAna</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { background-color: #2e7d32; padding: 30px; text-align: center; }
        .header h1 { color: #ffffff; margin: 0; font-size: 26px; }
        .body { padding: 32px 40px; color: #333333; }
        .body h2 { color: #2e7d32; margin-top: 0; }
        .mensaje-box { background-color: #f1f8e9; border-left: 4px solid #2e7d32; padding: 16px 20px; border-radius: 4px; margin: 20px 0; }
        .footer { background-color: #f4f4f4; text-align: center; padding: 20px; font-size: 12px; color: #888888; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>SurtiAna</h1>
    </div>
    <div class="body">
        <h2 th:text="${tipo}">Tipo de notificación</h2>
        <p>Hola, <strong th:text="${email}">usuario@email.com</strong></p>
        <div class="mensaje-box">
            <p th:text="${mensaje}">Mensaje de la notificación.</p>
        </div>
        <p>¡Gracias por confiar en <strong>SurtiAna</strong>!</p>
    </div>
    <div class="footer">
        <p>Este correo fue generado automáticamente. Por favor no respondas a este mensaje.</p>
        <p>&copy; 2025 SurtiAna. Todos los derechos reservados.</p>
    </div>
</div>
</body>
</html>
